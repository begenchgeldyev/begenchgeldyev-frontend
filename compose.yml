name: begenchgeldyev

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    depends_on:
      - backend
    networks:
      - begenchgeldyev-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    networks:
      - begenchgeldyev-network

networks:
  begenchgeldyev-network:
    driver: bridge
