<main class="max-w-6xl mx-auto px-8 py-20 min-h-screen">
  <!-- Page Header -->
  <div class="mb-16 border-b border-outline-variant pb-8">
    <div class="flex items-center gap-3 mb-4">
      <span class="font-mono text-primary-container text-xs bg-primary-container/10 px-3 py-1 border border-primary-container/30 uppercase tracking-widest">[BLOG ACTIVE]</span>
    </div>
    <h1 class="text-5xl md:text-6xl font-headline font-bold uppercase tracking-tighter text-white">
      My_Reflections<span class="blinking-cursor"></span>
    </h1>
    <p class="text-on-surface-variant font-mono text-sm mt-3">Thoughts on life, technology, and engineering.</p>
  </div>

  <!-- Terminal fetch indicator -->
  <div class="font-mono text-sm mb-6 text-on-surface-variant/60">
    <span class="text-primary-container font-bold">root@begench:~$</span>
    <span class="ml-2">curl -s /api/logs | jq .</span>
  </div>

  <!-- Blogs loaded via HTMX -->
  <div
    id="logs-container"
    hx-get="/api/logs"
    hx-trigger="load"
    hx-swap="innerHTML"
    class="space-y-4"
  >
    <!-- Loading state -->
    <div class="loading-indicator flex items-center gap-3 text-on-surface-variant/60 font-mono text-sm p-6">
      <span class="inline-block w-2 h-2 bg-primary-container rounded-full animate-pulse"></span>
      <span class="inline-block w-2 h-2 bg-primary-container rounded-full animate-pulse delay-150"></span>
      <span class="inline-block w-2 h-2 bg-primary-container rounded-full animate-pulse delay-300"></span>
      <span class="ml-2">Fetching posts...</span>
    </div>
  </div>
</main>
