<main class="max-w-6xl mx-auto px-8 py-20 min-h-screen">

  <div class="mb-16 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-outline-variant pb-8">
    <div>
      <div class="flex items-center gap-3 mb-4">
        <span class="font-mono text-primary-container text-xs bg-primary-container/10 px-3 py-1 border border-primary-container/30 uppercase tracking-widest">[PROJECTS CATALOG]</span>
      </div>
      <h1 class="text-5xl md:text-6xl font-headline font-bold uppercase tracking-tighter text-white">

      </h1>
      <p class="text-on-surface-variant font-mono text-sm mt-3">Production-grade systems &amp; experimental tools.</p>
    </div>
  </div>

  <!-- Projects Grid -->
  <div class="grid grid-cols-1 md:grid-cols-12 gap-6" hx-get="/api/projects" hx-trigger="load" hx-swap="innerHTML">

      <span class="font-mono text-on-surface-variant text-sm">Loading projects...</span>
    </div>
  </div>
